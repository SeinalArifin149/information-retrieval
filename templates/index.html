<!DOCTYPE html>
<html>
<head>
    <title>Search BM25</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .card {
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Search Berita Madura 🔍</h1>

<form method="POST" id="searchForm">

    <!-- INPUT SEARCH -->
    <input type="text" name="query" placeholder="Cari berita..." value="{{ query or '' }}">

    <br><br>

    <!-- FILTER CHECKBOX -->
    <b>Filter Sumber:</b><br>

    <div style="max-height:150px; overflow:auto; border:1px solid #ccc; padding:10px;">
        {% for s in semua_sumber %}
            <label>
                <input type="checkbox" name="sumber" value="{{ s }}"
                    {% if s in sumber_terpilih %}checked{% endif %}>
                {{ s }}
            </label><br>
        {% endfor %}
    </div>

    <br>

    <!-- tombol optional (boleh dihapus kalau mau full auto) -->
    <button type="submit">Cari</button>

</form>

<hr>

<!-- HASIL -->
{% if hasil and hasil|length > 0 %}
    <h2>Hasil:</h2>

    {% for item in hasil %}
        <div class="card">

            <h3>{{ item.judul }}</h3>

            <p>
                🔗
                <a href="{{ item.link }}" target="_blank">
                    Baca berita
                </a>
            </p>

            <p><b>Sumber:</b> {{ item.sumber }}</p>
            <p><b>Score:</b> {{ item.score }}</p>

        </div>
    {% endfor %}

{% else %}
    <p>Tidak ada hasil</p>
{% endif %}

<!-- AUTO SUBMIT SCRIPT -->
<script>
const form = document.getElementById("searchForm");

// auto submit kalau checkbox berubah
document.querySelectorAll('input[name="sumber"]').forEach(cb => {
    cb.addEventListener('change', () => {
        form.submit();
    });
});

// optional: auto submit kalau user tekan enter di search
document.querySelector('input[name="query"]').addEventListener('keypress', function(e) {
    if (e.key === "Enter") {
        form.submit();
    }
});
</script>

</body>
</html>
